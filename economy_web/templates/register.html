{% extends "base.html" %}

{% block title %}Criar conta{% endblock %}

{% block content %}
<div class="auth-page">
	<div class="auth-card">
		<h1>Criar conta</h1>
		<p class="muted">Registo por convite</p>

		<form method="POST" action="/register" class="auth-form">
			<input type="text" name="first_name" placeholder="Nome" required>
			<input type="text" name="last_name" placeholder="Apelido" required>
			<input type="text" name="username" placeholder="Utilizador" required>
			<input type="email" name="email" placeholder="Email" required>
			<input type="date" name="birth_date" required>

			<select name="country" required>
				<option value="">País</option>
				<option value="Portugal">Portugal</option>
				<option value="Switzerland">Switzerland</option>
				<option value="Germany">Germany</option>
				<option value="France">France</option>
				<option value="Spain">Spain</option>
				<option value="Italy">Italy</option>
				<option value="Other">Other</option>
			</select>

			<select name="language" required>
				<option value="pt">Português</option>
				<option value="en">English</option>
				<option value="de">Deutsch</option>
			</select>

			<select name="currency" required>
				<option value="CHF">CHF</option>
				<option value="EUR">EUR</option>
				<option value="USD">USD</option>
			</select>

			<input type="password" name="password" placeholder="Password" required>
			<input type="password" name="confirm_password" placeholder="Confirmar password" required>
			<input type="text" name="invite_code" placeholder="Código de convite" required>

			<button type="submit">Criar conta</button>
		</form>

		<div class="auth-links">
			<a href="/login">Já tenho conta</a>
		</div>
	</div>
</div>
{% endblock %}
