{% extends "base.html" %}

{% block title %}Criar conta{% endblock %}

{% block content %}
<div class="auth-wrapper">
	<div class="auth-card">
		<h1>Criar conta</h1>
		<p class="muted">Regista-te para começares a usar a aplicação.</p>

		<form method="POST" action="/register" class="auth-form">
			<input type="text" name="username" placeholder="Utilizador" required>
			<input type="password" name="password" placeholder="Password" required>
			<input type="password" name="confirm_password" placeholder="Confirmar password" required>
			<input type="text" name="invite_code" placeholder="Código de convite" required>

			<button type="submit">Criar conta</button>
		</form>

		<div class="muted" style="margin-top: 16px;">
			Já tens conta?
			<a href="/login">Entrar</a>
		</div>
	</div>
</div>
{% endblock %}
