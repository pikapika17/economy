{% extends "base.html" %}

{% block title %}Criar conta · Finances1st{% endblock %}

{% block content %}
<div class="auth-page">
	<div class="auth-card">
		<h1>Criar conta</h1>
		<p class="muted">Registo por convite</p>

		<form method="POST" action="/register" class="auth-form">
			<input type="text" name="first_name" placeholder="Nome" required>
			<input type="text" name="last_name" placeholder="Apelido" required>
			<input type="text" name="username" placeholder="Utilizador" required>
			<input type="email" name="email" placeholder="Email" required>
			<input type="date" name="birth_date" required>

			<select name="country" class="searchable-select" required>
				<option value="">País</option>
				{% for country in countries %}
					<option value="{{ country }}">{{ country }}</option>
				{% endfor %}
			</select>

			<select name="language" required>
				<option value="pt">Português</option>
				<option value="en">English</option>
				<option value="de">Deutsch</option>
			</select>

			<select name="currency" required>
				{% for currency in currencies %}
					<option value="{{ currency }}" {% if user.currency == currency %}selected{% endif %}>
						{{ currency }}
					</option>
				{% endfor %}
			</select>

			<input type="password" name="password" placeholder="Password" required>
			<input type="password" name="confirm_password" placeholder="Confirmar password" required>
			<input type="text" name="invite_code" placeholder="Código de convite" required>

			<button type="submit">Criar conta</button>
		</form>

		<div class="auth-links">
			<a href="/login">Já tenho conta</a>
		</div>
	</div>
</div>
{% endblock %}
