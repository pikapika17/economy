<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        :root {
            --bg: #171717;
            --panel: #232323;
            --panel-2: #2b2b2b;
            --input: #111111;
            --border: #353535;
            --primary: #2b74b4;
            --primary-hover: #3485cc;
            --text: #ffffff;
            --muted: #9f9f9f;
            --danger: #ff5c5c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top, #222 0%, #171717 45%, #111 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, var(--panel-2), var(--panel));
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 34px 30px 28px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), #4ba3ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(43, 116, 180, 0.35);
        }

        h1 {
            margin: 0 0 6px;
            text-align: center;
            font-size: 34px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 26px;
        }

        .erro {
            background: rgba(255, 92, 92, 0.12);
            border: 1px solid rgba(255, 92, 92, 0.25);
            color: var(--danger);
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            color: var(--muted);
            padding-left: 2px;
        }

        .field input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: var(--input);
            color: var(--text);
            font-size: 15px;
            transition: 0.15s ease;
        }

        .field input::placeholder {
            color: #6f6f6f;
        }

        .field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(43, 116, 180, 0.18);
        }

        .submit-btn {
            margin-top: 6px;
            height: 50px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(180deg, var(--primary-hover), var(--primary));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #7e7e7e;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">F</div>
        <h1>Entrar</h1>
        <div class="subtitle">Acesso à tua área financeira</div>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            <input id="username" type="text" name="username" placeholder="Utilizador" required autofocus>
            <input id="password" type="password" name="password" placeholder="Password" required>
            <button class="submit-btn" type="submit">Entrar</button>
        </form>

        <div class="footer">Finanças • área protegida</div>
    </div>
</body>
</html>
