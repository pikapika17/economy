{% extends "base.html" %}

{% block title %}Login · Finances1st{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>{{ t("enter") }}</h1>
        <p class="muted">{{ t("email_user") }}</p>

        {% if erro %}
            <div class="alert alert-error">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form">
            <input type="text" name="identifier" placeholder="{{ t('user_or_email') }}" required>
            <input type="password" name="password" placeholder="{{ t('password') }}" required>

            <button type="submit">{{ t("enter") }}</button>
        </form>

        <div class="auth-links">
            <a href="/forgot-password">{{ t("fpass") }}</a>
            <a href="/register">{{ t("newacc") }}</a>
        </div>
    </div>
</div>
{% endblock %}
