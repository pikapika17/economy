{% extends "base.html" %}

{% block title %}Login · Finances1st{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>{{ t("enter") }}</h1>
        <p class="muted">Usa o teu utilizador ou email</p>

        {% if erro %}
            <div class="alert alert-error">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form">
            <input type="text" name="identifier" placeholder="Utilizador ou email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Entrar</button>
        </form>

        <div class="auth-links">
            <a href="/forgot-password">Esqueci a palavra-passe</a>
            <a href="/register">Criar conta</a>
        </div>
    </div>
</div>
{% endblock %}
