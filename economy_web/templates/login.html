<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 16px;
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input, button {
            width: 100%;
            max-width: 260px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        input {
            background: #1a1a1a;
            color: white;
        }

        button {
            background: #1f6aa5;
            color: white;
            cursor: pointer;
        }

        .erro {
            color: #ff5c5c;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center;">Login</h2>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Utilizador" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
