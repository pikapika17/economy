<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Finanças{% endblock %}</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #2a2a2a;
            --panel-2: #222;
            --sidebar: #151515;
            --primary: #1f6aa5;
            --primary-hover: #2a7dc4;
            --danger: #8b0000;
            --danger-hover: #a00000;
            --success: #1f7a4d;
            --success-hover: #299b63;
            --text: #ffffff;
            --muted: #cfcfcf;
            --border: #3a3a3a;
            --green: #00d084;
            --red: #ff5c5c;
            --orange: #ffb347;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--sidebar);
            padding: 20px 10px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin: 0 0 20px 10px;
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            text-decoration: none;
            color: white;
            background: var(--primary);
            padding: 12px 14px;
            border-radius: 10px;
            margin: 8px 0;
            transition: 0.15s ease;
        }

        .sidebar a:hover {
            background: var(--primary-hover);
        }

        .content {
            flex: 1;
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 18px;
        }

        .box {
            background: var(--panel);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--panel);
            border-radius: var(--radius);
            padding: 18px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: var(--muted);
        }

        .card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .inline-form {
            display: contents;
        }

        input, select, button, textarea {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 14px;
        }

        input, select, textarea {
            background: #1a1a1a;
            color: white;
            min-width: 120px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-hover);
        }

        button {
            background: var(--primary);
            color: white;
            cursor: pointer;
            border: none;
            transition: 0.15s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: var(--success-hover);
        }

        .btn-link {
            text-decoration: none;
            color: white;
            background: #444;
            padding: 8px 10px;
            border-radius: 8px;
            display: inline-block;
            transition: 0.15s ease;
        }

        .btn-link:hover {
            background: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel);
            border-radius: var(--radius);
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        th {
            background: var(--panel-2);
        }

        tr:hover td {
            background: #2f2f2f;
        }

        .acoes {
            white-space: nowrap;
        }

        .acoes > * {
            margin-right: 6px;
        }

        .green { color: var(--green); }
        .red { color: var(--red); }
        .orange { color: var(--orange); }

        .muted {
            color: var(--muted);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .flash {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .flash-success {
            background: rgba(0, 208, 132, 0.15);
            color: var(--green);
        }

        .flash-error {
            background: rgba(255, 92, 92, 0.15);
            color: var(--red);
        }

        .flash-warning {
            background: rgba(255, 179, 71, 0.15);
            color: var(--orange);
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>Finanças</h2>
        <a href="/">🏠 Dashboard</a>
        <a href="/despesas">💸 Despesas</a>
        <a href="/dividas">💳 Dívidas</a>
        <a href="/pendentes">📌 Pendentes</a>
        <a href="/sistema">⚙️ Sistema</a>
        <a href="/planeamento">📅 Planeamento</a>
        <a href="/simulacao">📊 Simulação</a>
        <a href="/timeline">🗓️ Timeline</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="content">
        {% if mensagem %}
            <div class="flash flash-{{ mensagem.tipo }}">
                {{ mensagem.texto }}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</div>
</body>
</html>
