{% extends "base.html" %}

{% block title %}{{ t("export") }} · Finances1st{% endblock %}

{% block content %}
<h1>📦 {{ t("export") }}</h1>

<div class="grid-2">
    <div class="box">
        <h2>{{ t("expjson") }}</h2>
        <p class="muted">{{ t("backupjson") }}</p>
        <a class="btn-link btn-success" href="/export/json">{{ t("downloadjson") }}</a>
    </div>

    <div class="box">
        <h2>{{ t("expcsv") }}</h2>
        <p class="muted">{{ t("backupcsv") }}</p>
        <a class="btn-link btn-success" href="/export/csv">{{ t("downloadcsv") }}</a>
    </div>
</div>
{% endblock %}
