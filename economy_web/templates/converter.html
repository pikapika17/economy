{% extends "base.html" %}

{% block title %}{{ t("converter") }} · Finances1st{% endblock %}

{% block content %}
<h1>💱 {{ t("converter") }}</h1>

<div class="box">
    <h2>{{ t("currency_converter") }}</h2>

    <div class="converter-grid">
        <div class="converter-side">
            <label class="muted">{{ t("value") }}</label>
            <input
                id="fx-amount"
                type="number"
                step="0.01"
                min="0"
                value="1000"
                placeholder="{{ t('value') }}"
            >

            <label class="muted">{{ t("from_currency") }}</label>
            <select id="fx-from" class="searchable-select" required>
                {% for currency in currencies %}
                    <option value="{{ currency.code }}" {% if session_currency == currency.code %}selected{% endif %}>
                        {{ currency.code }} — {{ currency.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="converter-arrow">→</div>

        <div class="converter-side">
            <label class="muted">{{ t("to_currency") }}</label>
            <select id="fx-to" class="searchable-select" required>
                {% for currency in currencies %}
                    <option value="{{ currency.code }}" {% if currency.code == "EUR" %}selected{% endif %}>
                        {{ currency.code }} — {{ currency.name }}
                    </option>
                {% endfor %}
            </select>

            <div class="converter-result-box">
                <div id="fx-result" class="converter-result">
                    1000.00 {{ session_currency }} = 0.00 EUR
                </div>
                <div id="fx-rate" class="muted"></div>
                <div id="fx-error" class="red" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
let fxTimer = null;

function updateConverter() {
    const amount = document.getElementById("fx-amount").value || "0";
    const fromCurrency = document.getElementById("fx-from").value;
    const toCurrency = document.getElementById("fx-to").value;

    fetch(`/api/convert?amount=${encodeURIComponent(amount)}&from=${encodeURIComponent(fromCurrency)}&to=${encodeURIComponent(toCurrency)}`)
        .then(response => response.json())
        .then(data => {
            const resultEl = document.getElementById("fx-result");
            const rateEl = document.getElementById("fx-rate");
            const errorEl = document.getElementById("fx-error");

            if (!data.ok) {
                errorEl.style.display = "block";
                errorEl.textContent = data.error || "Erro ao converter.";
                rateEl.textContent = "";
                return;
            }

            errorEl.style.display = "none";
            resultEl.textContent = `${Number(data.amount).toFixed(2)} ${data.from_currency} = ${Number(data.converted).toFixed(2)} ${data.to_currency}`;
            rateEl.textContent = `1 ${data.from_currency} = ${Number(data.rate).toFixed(6)} ${data.to_currency}`;
        })
        .catch(() => {
            const errorEl = document.getElementById("fx-error");
            errorEl.style.display = "block";
            errorEl.textContent = "Erro ao converter.";
        });
}

function scheduleConverterUpdate() {
    clearTimeout(fxTimer);
    fxTimer = setTimeout(updateConverter, 250);
}

document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("fx-amount").addEventListener("input", scheduleConverterUpdate);
    document.getElementById("fx-from").addEventListener("change", updateConverter);
    document.getElementById("fx-to").addEventListener("change", updateConverter);
    updateConverter();
});
</script>
{% endblock %}
