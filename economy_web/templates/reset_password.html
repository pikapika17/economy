{% extends "base.html" %}

{% block title %}Nova password · Finances1st{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Nova password</h1>
        <p class="muted">Escolhe uma password nova</p>

        <form method="POST" action="" class="auth-form">
            <input type="password" name="password" placeholder="Nova password" required>
            <input type="password" name="confirm_password" placeholder="Confirmar password" required>
            <button type="submit">Guardar password</button>
        </form>

        <div class="auth-links">
            <a href="/login">Voltar ao login</a>
        </div>
    </div>
</div>
{% endblock %}
